name: test

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

jobs:
  go-test:
    name: go-test (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
          - os: ubuntu-24.04-arm
            label: linux-arm64
          - os: macos-13
            label: macos-amd64
          - os: macos-latest
            label: macos-arm64
          - os: windows-latest
            label: windows-amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Run unit and component tests
        run: go test ./...

  smoke:
    name: smoke (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
          - os: ubuntu-24.04-arm
            label: linux-arm64
          - os: macos-13
            label: macos-amd64
          - os: macos-latest
            label: macos-arm64
          - os: windows-latest
            label: windows-amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Build and smoke test binary (Unix)
        if: runner.os != 'Windows'
        run: |
          go build -o agentpack ./cmd/agentpack
          ./agentpack version
          ./agentpack list
          ./agentpack --help

      - name: Build and smoke test binary (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          go build -o agentpack.exe ./cmd/agentpack
          .\agentpack.exe version
          .\agentpack.exe list
          .\agentpack.exe --help

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8

  self-update-check:
    name: self-update-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Verify release binary auto-updates installed version
        run: |
          set -euo pipefail

          WORK_DIR="$(mktemp -d)"
          BIN_DIR="${WORK_DIR}/bin"
          DOWNLOADS_DIR="${WORK_DIR}/downloads"

          mkdir -p "${BIN_DIR}" "${DOWNLOADS_DIR}"

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags "-X github.com/Bbeboy/AgentPack/internal/version.Version=v0.0.1" \
            -o "${BIN_DIR}/agentpack" \
            ./cmd/agentpack

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags "-X github.com/Bbeboy/AgentPack/internal/version.Version=v9.9.9" \
            -o "${DOWNLOADS_DIR}/agentpack" \
            ./cmd/agentpack

          chmod +x "${BIN_DIR}/agentpack" "${DOWNLOADS_DIR}/agentpack"

          export PATH="${BIN_DIR}:${PATH}"

          BEFORE="$(agentpack --version)"
          case "${BEFORE}" in
            *"v0.0.1"*) ;;
            *)
              echo "expected initial version v0.0.1, got: ${BEFORE}"
              exit 1
              ;;
          esac

          "${DOWNLOADS_DIR}/agentpack"

          AFTER="$(agentpack --version)"
          case "${AFTER}" in
            *"v9.9.9"*) ;;
            *)
              echo "expected updated version v9.9.9, got: ${AFTER}"
              exit 1
              ;;
          esac

  cross-build:
    name: cross-build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Cross-compile cmd/agentpack for ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./cmd/agentpack

  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    needs:
      - go-test
      - smoke
      - lint
      - self-update-check
      - cross-build
    if: always()
    steps:
      - name: Enforce aggregated CI result
        run: |
          if [ "${{ needs.go-test.result }}" != "success" ] || \
             [ "${{ needs.smoke.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.self-update-check.result }}" != "success" ] || \
             [ "${{ needs.cross-build.result }}" != "success" ]; then
            echo "go-test=${{ needs.go-test.result }}"
            echo "smoke=${{ needs.smoke.result }}"
            echo "lint=${{ needs.lint.result }}"
            echo "self-update-check=${{ needs.self-update-check.result }}"
            echo "cross-build=${{ needs.cross-build.result }}"
            exit 1
          fi
          echo "all required checks passed"
