name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          if [ -z "$DATE" ]; then
            DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi

          mkdir -p dist

          for GOOS in linux darwin windows; do
            EXT=""
            if [ "$GOOS" = "windows" ]; then
              EXT=".exe"
            fi

            GOOS="$GOOS" GOARCH=amd64 CGO_ENABLED=0 go build \
              -ldflags "-s -w -X github.com/Bbeboy/AgentPack/internal/version.Version=${VERSION} -X github.com/Bbeboy/AgentPack/internal/version.Commit=${COMMIT} -X github.com/Bbeboy/AgentPack/internal/version.Date=${DATE}" \
              -o "dist/agentpack-${VERSION}-${GOOS}-amd64${EXT}" \
              ./cmd/agentpack
          done

          (cd dist && sha256sum * > checksums.txt)

      - name: Verify Linux binary
        run: ./dist/agentpack-${{ github.ref_name }}-linux-amd64 --version

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
