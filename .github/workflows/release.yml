name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Build release archives
        env:
          VERSION_TAG: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          if [ -z "$DATE" ]; then
            DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi

          VERSION="${VERSION_TAG#v}"

          mkdir -p dist build

          for GOOS in linux darwin windows; do
            for GOARCH in amd64 arm64; do
              BIN_NAME="agentpack"
              if [ "$GOOS" = "windows" ]; then
                BIN_NAME="agentpack.exe"
              fi

              BUILD_DIR="build/${GOOS}_${GOARCH}"
              mkdir -p "${BUILD_DIR}"

              GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED=0 go build \
                -ldflags "-s -w -X github.com/Bbeboy/AgentPack/internal/version.Version=${VERSION_TAG} -X github.com/Bbeboy/AgentPack/internal/version.Commit=${COMMIT} -X github.com/Bbeboy/AgentPack/internal/version.Date=${DATE}" \
                -o "${BUILD_DIR}/${BIN_NAME}" \
                ./cmd/agentpack

              ASSET_BASE="agentpack_${VERSION}_${GOOS}_${GOARCH}"
              if [ "$GOOS" = "windows" ]; then
                (
                  cd "${BUILD_DIR}"
                  zip -q "../../dist/${ASSET_BASE}.zip" "${BIN_NAME}"
                )
              else
                tar -C "${BUILD_DIR}" -czf "dist/${ASSET_BASE}.tar.gz" "${BIN_NAME}"
              fi
            done
          done

          (cd dist && sha256sum * > checksums.txt)

          ls -lah dist

      - name: Verify Linux binary
        run: ./build/linux_amd64/agentpack --version

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
